name: CI / Build and Push

# CI + CD in one gated pipeline:
#   * pull_request          -> run the server + extension test suites only
#   * push to main          -> test, then publish :latest and :sha-<commit>
#   * push of tag v1.2.3     -> test, then publish :1.2.3, :1.2, :1
#   * manual run             -> test, then publish
# The image is built ONLY after both test jobs pass (build-and-push `needs` them),
# and never on a pull_request.
on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

# A new push to the same ref supersedes an in-flight build/test run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/immich-forge

jobs:
  # --- Tests: gate the build, and run on every PR -------------------------------
  test-server:
    name: Test server (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Match the production runtime (the Dockerfile's base is Python 3.11).
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      # Core deps + test deps only. The heavy ML/GPU stack (requirements-ml.txt:
      # torch/basicsr/realesrgan/gfpgan) is NOT installed — every tested code path
      # runs on the classical-CV fallbacks, so CI stays fast and GPU-free.
      - name: Install dependencies
        working-directory: server
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pytest
        working-directory: server
        run: pytest

  test-extension:
    name: Test extension (vitest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        working-directory: extension
        run: npm ci

      - name: Typecheck
        working-directory: extension
        run: npm run lint

      - name: Run vitest
        working-directory: extension
        run: npm test

  # --- Build + publish: only after tests pass, never on a PR --------------------
  build-and-push:
    name: Build and push Docker image
    needs: [test-server, test-extension]
    # Tests run on PRs; publishing does not (no fork secrets, no untested release).
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # The CUDA + Torch image is large (~8-10GB). Reclaim runner disk first so
      # the build doesn't fail with "no space left on device".
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          # The image lives in server/; weights/.venv/.env are excluded via
          # server/.dockerignore so the context stays small.
          context: ./server
          file: ./server/Dockerfile
          push: true
          # CUDA base + cu124 Torch wheels are x86-64 only; no arm builds.
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=immich-forge
          cache-to: type=gha,mode=max,scope=immich-forge,ignore-error=true
