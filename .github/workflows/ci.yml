name: CI / Release

# Conservative, strictly-gated pipeline with INDEPENDENT release tracks for the
# two components, each driven by its own prefixed version tag:
#
#   pull_request            -> TEST ONLY (both suites). The gatekeeper. No secrets,
#                              no publishing — safe for external/fork contributors.
#   push to main (merge)    -> test both, then BUILD the extension and upload the
#                              .zip as a workflow artifact. No publish of any kind.
#   push tag  api-v X.Y.Z   -> test the SERVER, then publish the Docker image
#                              (:latest + :vX.Y.Z). The extension is untouched.
#   push tag  ext-v X.Y.Z   -> test the EXTENSION, then build the .zip and attach
#                              it to a draft GitHub Release. Docker is untouched.
#
# The two tag families never cross-trigger: an api-v tag can't ship the extension
# and an ext-v tag can't ship the image. Use scripts/release-server.sh and
# scripts/release-extension.sh to cut the tags.
on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'api-v[0-9]+.[0-9]+.[0-9]+'
      - 'ext-v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

# A newer push to the same ref supersedes an in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/immich-forge

jobs:
  # === GATEKEEPER ==============================================================
  # PRs and main-merges run BOTH suites. On a tag we run only the suite for the
  # component being released (the other is skipped), keeping the tracks independent
  # and fast. These jobs use NO secrets and are safe for fork PRs; branch
  # protection should require both.
  test-server:
    name: Test server (pytest)
    # Skip only when releasing the extension (ext-v tag); runs on PRs, main, api-v.
    if: ${{ !startsWith(github.ref, 'refs/tags/ext-v') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Match the production runtime (the Dockerfile's base is Python 3.11).
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      # Core deps + test deps only. The heavy ML/GPU stack (requirements-ml.txt:
      # torch/basicsr/realesrgan/gfpgan) is NOT installed — every tested code path
      # runs on the classical-CV fallbacks, so CI stays fast and GPU-free.
      - name: Install dependencies
        working-directory: server
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pytest
        working-directory: server
        run: pytest

  test-extension:
    name: Test extension (lint + vitest)
    # Skip only when releasing the server (api-v tag); runs on PRs, main, ext-v.
    if: ${{ !startsWith(github.ref, 'refs/tags/api-v') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        working-directory: extension
        run: npm ci

      - name: Typecheck (tsc)
        working-directory: extension
        run: npm run lint

      - name: Run vitest
        working-directory: extension
        run: npm test

  # === EXTENSION ARTIFACT / RELEASE ============================================
  # Runs on main-merges (artifact only) and ext-v tags (artifact + draft release).
  # Never on a PR, and never on an api-v tag (that's a server-only release).
  # Artifact-first: the Web Store upload stays a manual, human-reviewed step.
  package-extension:
    name: Package extension (.zip)
    needs: test-extension
    if: >-
      ${{ github.event_name != 'pull_request'
          && !startsWith(github.ref, 'refs/tags/api-v') }}
    runs-on: ubuntu-latest
    permissions:
      # Needed only by the tag-gated draft-release step; the artifact upload
      # itself needs no special scope.
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: extension/package-lock.json

      # A clean version label: "ext-v1.2.3" -> "v1.2.3"; on main it's just "main".
      - name: Derive version label
        id: label
        run: echo "value=${GITHUB_REF_NAME#ext-}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        working-directory: extension
        run: npm ci

      # Production build -> extension/dist/ (manifest.json at the root, as the
      # Chrome Web Store expects).
      - name: Build production assets
        working-directory: extension
        run: npm run build

      # Zip the CONTENTS of dist/ so manifest.json lands at the archive root.
      - name: Package dist into a Web Store .zip
        working-directory: extension/dist
        run: zip -r "../../immich-forge-extension-${{ steps.label.outputs.value }}.zip" .

      - name: Upload .zip as a workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: immich-forge-extension-${{ steps.label.outputs.value }}
          path: immich-forge-extension-${{ steps.label.outputs.value }}.zip
          retention-days: 30

      # On an ext-v tag ONLY: attach the .zip to a DRAFT GitHub Release. Draft,
      # so a human reviews and submits to the Web Store manually.
      - name: Attach .zip to a draft GitHub Release
        if: startsWith(github.ref, 'refs/tags/ext-v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: Extension ${{ steps.label.outputs.value }}
          files: immich-forge-extension-${{ steps.label.outputs.value }}.zip
          body: |
            Automated draft for the Chrome extension. Review before publishing.

            Upload the attached `.zip` to the Chrome Web Store manually.

  # === DOCKER PUBLISH ==========================================================
  # Runs ONLY for a pushed api-v*.*.* tag, and ONLY after the server tests pass.
  # A merge to main, a PR, or an ext-v tag can never reach this job.
  build-and-push:
    name: Build and push Docker image
    needs: test-server
    if: startsWith(github.ref, 'refs/tags/api-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # "api-v1.2.3" -> "v1.2.3" for the image tag.
      - name: Derive image version
        id: ver
        run: echo "value=${GITHUB_REF_NAME#api-}" >> "$GITHUB_OUTPUT"

      # The CUDA + Torch image is large (~8-10GB). Reclaim runner disk first so
      # the build doesn't fail with "no space left on device".
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          # The image lives in server/; weights/.venv/.env are excluded via
          # server/.dockerignore so the context stays small.
          context: ./server
          file: ./server/Dockerfile
          push: true
          # CUDA base + cu124 Torch wheels are x86-64 only; no arm builds.
          platforms: linux/amd64
          # Both tags only ever push from an api-v tag, so :latest always points
          # at the newest server release.
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.value }}
          cache-from: type=gha,scope=immich-forge
          cache-to: type=gha,mode=max,scope=immich-forge,ignore-error=true
