name: Build and Push Docker Image

# Publishes the Forge server image to Docker Hub:
#   * push to main         -> :latest and :sha-<commit>
#   * push of tag v1.2.3   -> :1.2.3, :1.2, :1
#   * manual run from the Actions tab
on:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

# A new push to the same ref supersedes an in-flight (slow, ~10GB) build.
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/immich-forge

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # The CUDA + Torch image is large (~8-10GB). Reclaim runner disk first so
      # the build doesn't fail with "no space left on device".
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          # The image lives in server/; weights/.venv/.env are excluded via
          # server/.dockerignore so the context stays small.
          context: ./server
          file: ./server/Dockerfile
          push: true
          # CUDA base + cu124 Torch wheels are x86-64 only; no arm builds.
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=immich-forge
          cache-to: type=gha,mode=max,scope=immich-forge,ignore-error=true
